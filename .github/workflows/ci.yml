name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./...

      - name: Install curl
        run: sudo apt-get install -y --no-install-recommends curl

      - name: Enable IPv6 multicast on loopback
        run: |
          sudo ip link set lo multicast on
          sudo ip -6 route add ff00::/8 dev lo table local 2>/dev/null || true

      - name: E2E test
        run: make test-e2e
